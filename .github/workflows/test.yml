name: Tests
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-python
      - run: pip install -e .[test]
      - name: Check CLI entry points
        run: |
          sabr --help
          sabr --version
      - name: Run fast tests
        run: pytest --cov=sabr --cov-report=term-missing

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-python
      - run: pip install -e .[docs]
      - name: Build docs
        run: sphinx-build -W -E -b html docs docs/_build/html

  slow:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup-python
      - run: pip install -e .[test]
      - name: Run slow tests
        run: JAX_PLATFORMS=cpu pytest -m slow
