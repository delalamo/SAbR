name: Code Formatting
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  formatting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install formatters
        run: |
          pip install ruff
          npm install -g prettier

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format
        run: ruff format --check .

      - name: Run Prettier
        run: prettier --check "**/*.{js,ts,css,md,yml,yaml,json}"
